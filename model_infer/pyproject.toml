# ---- All project specifications ---- #
[project]
name = "vgo"
description = "Visual Generation - O"
readme = "README.md"
requires-python = ">=3.10"
license = { file = "LICENSE" }
authors = [{ name = "Ray Wang" }]
keywords = ["pytorch", "finetuning", "adapting", "diffusion"]
dependencies = [
  # Hugging Face integrations
  "safetensors",
  "peft",

  # Miscellaneous
  "fire",
  "loguru",
  "tqdm",
  "omegaconf",
]
dynamic = ["version"]

[project.optional-dependencies]
dev = ["tensorboard"]

[tool.setuptools.dynamic]
version = { attr = "vgo.__version__" }


[tool.isort]
profile = "black"

[tool.ruff]
line-length = 119
[tool.ruff.lint]
select = ["E", "F", "W", "C90", "I", "UP", "B", "C4", "RET", "RUF", "SIM", "I"]
ignore = [
  "UP007",
  "C408",
  "B905",
  "RET504",
  "RET505",
  "RUF005",
  "SIM102",
  "UP038",
  "RUF001",
  "RUF002",
  "RUF003"
]

[tool.ruff.lint.mccabe]
max-complexity = 10


[tool.black]
line-length = 119
target-version = ['py310']
include = '\.pyi?$'
# 'extend-exclude' excludes files or directories in addition to the defaults
extend-exclude = '''
# A regex preceded with ^/ will apply only to files and directories
# in the root of the project.
(
  ^/foo.py    # exclude a file named foo.py in the root of the project
  | .*_pb2.py  # exclude autogenerated Protocol Buffer files anywhere in the project
)
'''


# ---- Tooling specifications ---- #
[tool.usort]
first_party_detection = false

[tool.pyright]
reportAssignmentType = "none"
reportArgumentType = "information"
reportReturnType = "information"
reportAttributeAccessIssue = "warning"
reportPrivateImportUsage = "none"
reportCallIssue = "information"

[tool.pydoclint]
style = 'google'
check-return-types = 'False'

[tool.pytest.ini_options]
addopts = [
  "--showlocals",
  "--import-mode=prepend",
  "--without-integration",
  "--without-slow-integration",
]
# --showlocals will show local variables in tracebacks
# --import-mode=prepend will add the root (the parent dir of vtuna/, tests/, recipes/)
# to `sys.path` when invoking pytest, allowing us to treat `tests` as a package within the tests.
# --without-integration and --without-slow-integration: default to running unit tests only

[tool.setuptools.packages.find]
where = [""]
include = ["vgo*"] # alternatively: `exclude = ["additional*"]`
namespaces = true

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
